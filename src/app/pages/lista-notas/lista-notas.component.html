<div class="container">
  <div class="wrapper">
    <div class="header">
      <h1>Mis notas</h1>
      <button class="btn-nueva" (click)="nueva()">+ Nueva nota</button>
    </div>

    <div class="lista">
      <p class="empty" *ngIf="notas.length === 0">No tienes notas todavía.</p>

      <div class="nota-card" *ngFor="let nota of notas">
        <div class="nota-top">
          <h2>{{ nota.titulo }}</h2>
          <span class="fecha">{{ nota.fecha | date:'dd/MM/yyyy' }}</span>
        </div>
        <p class="contenido">{{ nota.contenido }}</p>
        <div class="acciones">
          <button class="btn-editar" (click)="editar(nota.id)">Editar</button>
          <button class="btn-eliminar" (click)="eliminar(nota.id)">Eliminar</button>
        </div>
      </div>
    </div>
  </div>
</div>
